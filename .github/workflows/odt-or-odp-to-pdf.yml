name: Convert ODT/ODP to PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      convert_all:
        description: 'Convertir tous les ODT/ODP du dépôt (pas seulement les modifiés)'
        type: boolean
        default: false

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libreoffice --no-install-recommends

      - name: Récupérer les fichiers à convertir
        id: changed_files
        run: |
          CHECKSUM_FILE="pdf_output/.checksums"
          mkdir -p pdf_output

          if [ "${{ inputs.convert_all }}" = "true" ]; then
            echo "Mode : tous les fichiers ODT/ODP du dépôt"
            FILES=$(find . -name '*.odt' -o -name '*.odp' -not -path './.git/*' | sed 's|^\./||')

          else
            echo "Mode : ODT/ODP nouveaux ou dont le contenu a changé"
            FILES=$(find . -name '*.odt' -o -name '*.odp' -not -path './.git/*' | sed 's|^\./||' | while IFS= read -r FIL; do
              CURRENT_HASH=$(md5sum "$FIL" | awk '{print $1}')

              # Clé = hash MD5 du chemin pour éviter tout problème avec espaces/slashes
              PATH_KEY=$(echo "$FIL" | md5sum | awk '{print $1}')

              SAVED_HASH=""
              if [ -f "$CHECKSUM_FILE" ]; then
                SAVED_HASH=$(grep "^${PATH_KEY}|" "$CHECKSUM_FILE" | cut -d'|' -f2)
              fi

              if [ -z "$SAVED_HASH" ] || [ "$CURRENT_HASH" != "$SAVED_HASH" ]; then
                echo "$FIL"
              fi
            done)
          fi

          echo "Fichiers à traiter : '$FILES'"
          if [ -z "$FILES" ]; then
            echo "Aucun fichier ODT/ODP à convertir."
          fi

          {
            echo 'files<<EOF'
            echo "$FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Convertir les ODT/ODP en PDF
        if: steps.changed_files.outputs.files != ''
        env:
          ODT_FILES: ${{ steps.changed_files.outputs.files }}
        run: |
          PDF_DIR="pdf_output"
          CHECKSUM_FILE="$PDF_DIR/.checksums"
          mkdir -p "$PDF_DIR"

          while IFS= read -r ODTP_FILE; do
            [ -z "$ODTP_FILE" ] && continue

            if [ ! -f "$ODTP_FILE" ]; then
              echo "Ignoré (introuvable) : $ODTP_FILE"
              continue
            fi

            echo "Conversion de : $ODTP_FILE"
            RELATIVE_DIR=$(dirname "$ODTP_FILE")
            TARGET_DIR="$PDF_DIR/$RELATIVE_DIR"
            mkdir -p "$TARGET_DIR"

            libreoffice --headless \
              --convert-to pdf \
              "$ODTP_FILE" \
              --outdir "$TARGET_DIR"

            # Clé = hash MD5 du chemin
            PATH_KEY=$(echo "$ODTP_FILE" | md5sum | awk '{print $1}')
            NEW_HASH=$(md5sum "$ODTP_FILE" | awk '{print $1}')

            # Supprimer l'ancienne entrée et écrire la nouvelle
            if [ -f "$CHECKSUM_FILE" ]; then
              grep -v "^${PATH_KEY}|" "$CHECKSUM_FILE" > "$CHECKSUM_FILE.tmp" && mv "$CHECKSUM_FILE.tmp" "$CHECKSUM_FILE"
            fi
            echo "${PATH_KEY}|${NEW_HASH}" >> "$CHECKSUM_FILE"

          done <<< "$ODTP_FILES"

      - name: Commit et push des PDFs
        if: steps.changed_files.outputs.files != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pdf_output/
          git diff --cached --quiet || git commit -m "ci: conversion ODT/ODP -> PDF [skip ci]"
          git push
