name: Convert ODT to PDF
on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      convert_all:
        description: 'Convertir tous les ODT du dépôt (pas seulement les modifiés)'
        type: boolean
        default: false

jobs:
  convert:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Installer LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libreoffice --no-install-recommends

      - name: Récupérer les fichiers ODT à convertir
        id: changed_files
        run: |
          if [ "${{ inputs.convert_all }}" = "true" ]; then
            FILES=$(find . -name '*.odt' -not -path './.git/*' | sed 's|^\./||')
          else
            FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- '*.odt')
          fi


          echo "Fichiers à traiter : '$FILES'"

          if [ -z "$FILES" ]; then
            echo "Aucun fichier ODT à convertir."
          fi

          {
            echo 'files<<EOF'
            echo "$FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Convertir les ODT en PDF
        if: steps.changed_files.outputs.files != ''
        env:
          ODT_FILES: ${{ steps.changed_files.outputs.files }}
        run: |
          PDF_DIR="pdf_output"
          mkdir -p "$PDF_DIR"
          
          while IFS= read -r ODT_FILE; do
          
            [ -z "$ODT_FILE" ] && continue
          
            if [ ! -f "$ODT_FILE" ]; then
              echo "Ignoré : $ODT_FILE"
              continue
            fi

            echo "Conversion de : $ODT_FILE"
          
            RELATIVE_DIR=$(dirname "$ODT_FILE")
            TARGET_DIR="$PDF_DIR/$RELATIVE_DIR"
          
            mkdir -p "$TARGET_DIR"
          
            libreoffice --headless \
              --convert-to pdf \
              "$ODT_FILE" \
              --outdir "$TARGET_DIR"
        
          done <<< "$ODT_FILES"

      - name: Commit et push des PDFs
        if: steps.changed_files.outputs.files != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pdf_output/
          git diff --cached --quiet || git commit -m "ci: conversion ODT -> PDF [skip ci]"
          git push
        
