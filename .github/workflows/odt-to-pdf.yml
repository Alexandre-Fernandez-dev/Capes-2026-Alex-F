name: Convert ODT to PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      convert_all:
        description: 'Convertir tous les ODT du dépôt (pas seulement les modifiés)'
        type: boolean
        default: false

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libreoffice --no-install-recommends

      - name: Récupérer les fichiers ODT à convertir
        id: changed_files
        run: |
          CHECKSUM_FILE="pdf_output/.checksums"
          mkdir -p pdf_output

          if [ "${{ inputs.convert_all }}" = "true" ]; then
            echo "Mode : tous les fichiers ODT du dépôt"
            FILES=$(find . -name '*.odt' -not -path './.git/*' | sed 's|^\./||')

          else
            echo "Mode : ODT nouveaux ou dont le contenu a changé"
            FILES=$(find . -name '*.odt' -not -path './.git/*' | sed 's|^\./||' | while IFS= read -r ODT; do
              CURRENT_HASH=$(md5sum "$ODT" | awk '{print $1}')

              # Clé = hash MD5 du chemin pour éviter tout problème avec espaces/slashes
              PATH_KEY=$(echo "$ODT" | md5sum | awk '{print $1}')

              SAVED_HASH=""
              if [ -f "$CHECKSUM_FILE" ]; then
                SAVED_HASH=$(grep "^${PATH_KEY}|" "$CHECKSUM_FILE" | cut -d'|' -f2)
              fi

              if [ -z "$SAVED_HASH" ] || [ "$CURRENT_HASH" != "$SAVED_HASH" ]; then
                echo "$ODT"
              fi
            done)
          fi

          echo "Fichiers à traiter : '$FILES'"
          if [ -z "$FILES" ]; then
            echo "Aucun fichier ODT à convertir."
          fi

          {
            echo 'files<<EOF'
            echo "$FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Convertir les ODT en PDF
        if: steps.changed_files.outputs.files != ''
        env:
          ODT_FILES: ${{ steps.changed_files.outputs.files }}
        run: |
          PDF_DIR="pdf_output"
          CHECKSUM_FILE="$PDF_DIR/.checksums"
          mkdir -p "$PDF_DIR"

          while IFS= read -r ODT_FILE; do
            [ -z "$ODT_FILE" ] && continue

            if [ ! -f "$ODT_FILE" ]; then
              echo "Ignoré (introuvable) : $ODT_FILE"
              continue
            fi

            echo "Conversion de : $ODT_FILE"
            RELATIVE_DIR=$(dirname "$ODT_FILE")
            TARGET_DIR="$PDF_DIR/$RELATIVE_DIR"
            mkdir -p "$TARGET_DIR"

            libreoffice --headless \
              --convert-to pdf \
              "$ODT_FILE" \
              --outdir "$TARGET_DIR"

            # Clé = hash MD5 du chemin
            PATH_KEY=$(echo "$ODT_FILE" | md5sum | awk '{print $1}')
            NEW_HASH=$(md5sum "$ODT_FILE" | awk '{print $1}')

            # Supprimer l'ancienne entrée et écrire la nouvelle
            if [ -f "$CHECKSUM_FILE" ]; then
              grep -v "^${PATH_KEY}|" "$CHECKSUM_FILE" > "$CHECKSUM_FILE.tmp" && mv "$CHECKSUM_FILE.tmp" "$CHECKSUM_FILE"
            fi
            echo "${PATH_KEY}|${NEW_HASH}" >> "$CHECKSUM_FILE"

          done <<< "$ODT_FILES"

      - name: Commit et push des PDFs
        if: steps.changed_files.outputs.files != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pdf_output/
          git diff --cached --quiet || git commit -m "ci: conversion ODT -> PDF [skip ci]"
          git push
